<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Lumière</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FFFCF9; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .flower-frame { pointer-events: none; z-index: 10; opacity: 0.20; width: 300px; }
        /* Estilo para el toggle activo */
        .role-btn-active { background-color: white !important; color: #6E3B9C !important; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="relative min-h-screen">

    <!-- FLORES FIJAS -->
    <div class="fixed left-0 top-0 flower-frame h-screen flex items-start">
        <img src="https://www.transparentpng.com/download/floral/flower-pink-floral-design-png-11.png" class="w-full mt-20">
    </div>
    <div class="fixed right-0 top-0 flower-frame h-screen flex items-start rotate-180">
        <img src="https://www.transparentpng.com/download/floral/flower-pink-floral-design-png-11.png" class="w-full mt-20">
    </div>

    <!-- HEADER -->
    <header class="text-center pt-10 relative z-20">
        <img th:src="@{/images/logo.png}" alt="Lumiere Logo" class="h-24 mx-auto mb-2">
        <p class="text-[10px] tracking-[0.4em] text-gray-400 uppercase font-light">Illuminate your beauty business</p>
        <div class="flex justify-center space-x-10 mt-8 text-sm font-medium text-gray-500">
            <a th:href="@{/}" class="hover:text-purple-600">Inicio</a>
            <a th:href="@{/explorar}" class="hover:text-purple-600">Buscar empresas</a>
            <a th:href="@{/registro}" class="hover:text-purple-600">Para emprendedores</a>
        </div>
    </header>

    <!-- CONTENIDO REGISTRO -->
    <main class="max-w-md mx-auto px-6 py-12 relative z-20">
        <div class="text-center mb-8">
            <h1 class="text-5xl font-serif text-[#6E3B9C] mb-3">Crear cuenta</h1>
            <p class="text-gray-400 text-sm">Únete a la comunidad Lumière</p>
        </div>

        <form th:action="@{/registro/guardar}" th:object="${usuario}" method="post" class="space-y-5">
            
            <!-- SELECTOR DE ROL (TAB STYLE) -->
            <div class="bg-[#F3EBF7] p-1.5 rounded-2xl flex items-center mb-8">
                <button type="button" id="btn-cliente" onclick="setRole('CLIENTE')" class="flex-1 py-3 text-sm font-semibold rounded-xl transition-all role-btn-active">
                    Soy clienta
                </button>
                <button type="button" id="btn-emprendedor" onclick="setRole('EMPRENDEDOR')" class="flex-1 py-3 text-sm font-semibold text-gray-500 rounded-xl transition-all">
                    Soy emprendedora
                </button>
            </div>
            
            <!-- Input oculto para el rol que se envía a Java -->
            <input type="hidden" th:field="*{rol}" id="rol-input" value="CLIENTE">

            <div class="space-y-2">
                <label class="block text-sm font-bold text-[#4A235A] ml-1">Nombre completo</label>
                <input type="text" th:field="*{nombre}" class="w-full px-5 py-4 rounded-2xl bg-white border border-gray-100 shadow-sm focus:ring-2 focus:ring-purple-200 outline-none transition-all" required>
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-bold text-[#4A235A] ml-1">Teléfono (opcional)</label>
                <input type="tel" name="telefono" class="w-full px-5 py-4 rounded-2xl bg-white border border-gray-100 shadow-sm focus:ring-2 focus:ring-purple-200 outline-none transition-all">
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-bold text-[#4A235A] ml-1">Correo</label>
                <input type="email" th:field="*{email}" class="w-full px-5 py-4 rounded-2xl bg-white border border-gray-100 shadow-sm focus:ring-2 focus:ring-purple-200 outline-none transition-all" required>
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-bold text-[#4A235A] ml-1">Contraseña</label>
                <input type="password" th:field="*{password}" class="w-full px-5 py-4 rounded-2xl bg-white border border-gray-100 shadow-sm focus:ring-2 focus:ring-purple-200 outline-none transition-all" required>
            </div>

            <button type="submit" class="w-full bg-[#6E3B9C] text-white py-4 rounded-2xl font-bold text-lg hover:bg-purple-800 transition-all shadow-lg shadow-purple-100 mt-4">
                Crear cuenta
            </button>
        </form>
    </main>

    <!-- SCRIPT PARA EL CAMBIO DE ROL -->
    <script>
        function setRole(role) {
            document.getElementById('rol-input').value = role;
            const btnCliente = document.getElementById('btn-cliente');
            const btnEmp = document.getElementById('btn-emprendedor');

            if(role === 'CLIENTE') {
                btnCliente.classList.add('role-btn-active', 'text-[#6E3B9C]');
                btnCliente.classList.remove('text-gray-500');
                btnEmp.classList.remove('role-btn-active', 'text-[#6E3B9C]');
                btnEmp.classList.add('text-gray-500');
            } else {
                btnEmp.classList.add('role-btn-active', 'text-[#6E3B9C]');
                btnEmp.classList.remove('text-gray-500');
                btnCliente.classList.remove('role-btn-active', 'text-[#6E3B9C]');
                btnCliente.classList.add('text-gray-500');
            }
        }
    </script>
</body>
</html>
