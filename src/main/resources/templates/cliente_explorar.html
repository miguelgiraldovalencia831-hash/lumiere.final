<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>body{font-family:'Inter';background-color:#FFFCF9}.font-serif{font-family:'Playfair Display'}</style></head>
<body class="p-10">
    <div class="max-w-6xl mx-auto text-center">
        <h1 class="text-6xl font-serif text-[#6E3B9C] mb-4">Explora la red</h1>
        
        <!-- FORMULARIO DE BÚSQUEDA -->
        <form th:action="@{/explorar}" method="get" class="max-w-2xl mx-auto relative mb-12">
            <input type="text" name="buscar" placeholder="Busca por nombre o ciudad..." 
                class="w-full pl-16 pr-8 py-5 rounded-full border border-gray-100 shadow-sm outline-none focus:ring-2 focus:ring-purple-200 transition-all">
            <button type="submit" class="absolute left-6 top-1/2 -translate-y-1/2 text-xl">🔍</button>
        </form>

        <div class="grid md:grid-cols-3 gap-10 text-left">
            <div th:each="emp : ${lista}" class="group">
                <div class="h-64 bg-gray-200 rounded-[2.5rem] overflow-hidden mb-6 shadow-sm">
                    <!-- FOTO REAL O POR DEFECTO -->
                    <img th:src="${emp.fotoUrl != null && emp.fotoUrl != '' ? emp.fotoUrl : 'https://images.unsplash.com/photo-1560066984-138dadb4c035?q=80&w=800'}" 
                         class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                </div>
                <h3 class="text-2xl font-serif text-[#4A235A]" th:text="${emp.nombre}"></h3>
                <p class="text-gray-400 text-sm mb-4" th:text="${emp.direccion}"></p>
                <a th:href="@{'/empresa/perfil/' + ${emp.id}}" class="text-[#6E3B9C] font-bold text-sm uppercase tracking-widest underline underline-offset-8">Ver portafolio</a>
            </div>
        </div>
    </div>
</body>
</html>
