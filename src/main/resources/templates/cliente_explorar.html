<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Lumiere - Explorar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <nav class="bg-white/80 backdrop-blur-md border-b h-20 px-8 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center">
            <img th:src="@{/images/logo.png}" class="h-10">
            <span class="ml-3 font-black text-xl italic text-pink-600">LUMIERE</span>
        </div>
        <a th:href="@{/}" class="text-slate-500 font-bold">Inicio</a>
    </nav>

    <main class="max-w-7xl mx-auto p-10">
        <h1 class="text-4xl font-black text-slate-900 mb-2">Descubre Salones</h1>
        <p class="text-slate-500 mb-12 text-lg">Reserva los mejores servicios de belleza en tu ciudad.</p>

        <div class="grid md:grid-cols-3 lg:grid-cols-4 gap-8">
            <div th:each="emp : ${lista}" class="bg-white rounded-[2.5rem] overflow-hidden shadow-sm hover:shadow-2xl transition-all border border-slate-100 group">
                <div class="h-40 bg-pink-100 flex items-center justify-center text-4xl">✨</div>
                <div class="p-8">
                    <h3 class="text-2xl font-bold text-slate-800 mb-2" th:text="${emp.nombre}"></h3>
                    <p class="text-slate-400 text-sm mb-6" th:text="${emp.direccion}">📍 Ubicación</p>
                    <a th:href="@{'/empresa/perfil/' + ${emp.id}}" class="block text-center bg-pink-600 text-white py-4 rounded-2xl font-bold hover:bg-pink-700 transition-all shadow-lg shadow-pink-100">Ver Portafolio</a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
