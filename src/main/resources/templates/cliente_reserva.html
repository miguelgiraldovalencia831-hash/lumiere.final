<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center font-sans">
    <div class="max-w-md w-full bg-white p-10 rounded-[3rem] shadow-2xl border border-white">
        <h2 class="text-3xl font-black mb-2 text-center italic text-pink-600">AGENDAR CITA</h2>
        <p class="text-center text-slate-400 mb-8" th:text="'Servicio: ' + ${cita.servicio.nombre}"></p>

        <form th:action="@{/reservar/guardar}" th:object="${cita}" method="post" class="space-y-4">
            <input type="hidden" name="empresaId" th:value="${cita.empresa.id}">
            <input type="hidden" name="servicioId" th:value="${cita.servicio.id}">

            <input type="text" th:field="*{nombreCliente}" placeholder="Tu nombre completo" class="w-full bg-slate-50 p-4 rounded-2xl outline-none" required>
            <input type="tel" th:field="*{telefono}" placeholder="Tu teléfono" class="w-full bg-slate-50 p-4 rounded-2xl outline-none" required>
            
            <div class="grid grid-cols-2 gap-4">
                <input type="date" th:field="*{fecha}" class="w-full bg-slate-50 p-4 rounded-2xl outline-none" required>
                <input type="time" th:field="*{hora}" class="w-full bg-slate-50 p-4 rounded-2xl outline-none" required>
            </div>

            <button type="submit" class="w-full bg-pink-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-pink-100">Confirmar Cita</button>
        </form>
    </div>
</body>
</html>
