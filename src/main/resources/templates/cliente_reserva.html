<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservar Cita - Lumière</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FFFCF9; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .flower-frame { pointer-events: none; z-index: 10; opacity: 0.20; width: 300px; }
    </style>
</head>
<body class="relative min-h-screen">
    <!-- FLORES FIJAS -->
    <div class="fixed left-0 top-0 flower-frame h-screen flex items-start"><img src="https://www.transparentpng.com/download/floral/flower-pink-floral-design-png-11.png" class="w-full mt-20"></div>
    <div class="fixed right-0 top-0 flower-frame h-screen flex items-start rotate-180"><img src="https://www.transparentpng.com/download/floral/flower-pink-floral-design-png-11.png" class="w-full mt-20"></div>

    <header class="text-center pt-10 pb-6 relative z-20">
        <img th:src="@{/images/logo.png}" alt="Lumiere Logo" class="h-24 mx-auto mb-2">
        <p class="text-[10px] tracking-[0.4em] text-gray-400 uppercase font-light italic">Illuminate your beauty business</p>
    </header>

    <main class="max-w-md mx-auto px-6 py-12 relative z-20">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-serif text-[#6E3B9C] mb-3">Reservar cita</h1>
            <p class="text-gray-400 text-sm italic" th:text="'Estás reservando: ' + ${cita.servicio.nombre}"></p>
        </div>

        <form th:action="@{/reservar/guardar}" th:object="${cita}" method="post" class="space-y-6">
            <!-- HIDDEN FIELDS - No cambiar estos nombres -->
            <input type="hidden" name="empresaId" th:value="${cita.empresa.id}">
            <input type="hidden" name="servicioId" th:value="${cita.servicio.id}">

            <div class="space-y-2">
                <label class="block text-sm font-bold text-[#4A235A] ml-1">Nombre completo</label>
                <input type="text" th:field="*{nombreCliente}" class="w-full px-5 py-4 rounded-2xl bg-white border border-gray-100 shadow-sm focus:ring-2 focus:ring-purple-200 outline-none" required>
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-bold text-[#4A235A] ml-1">Teléfono</label>
                <input type="tel" th:field="*{telefono}" class="w-full px-5 py-4 rounded-2xl bg-white border border-gray-100 shadow-sm focus:ring-2 focus:ring-purple-200 outline-none" required>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-[#4A235A] ml-1">Fecha</label>
                    <input type="date" th:field="*{fecha}" class="w-full px-5 py-4 rounded-2xl bg-white border border-gray-100 shadow-sm focus:ring-2 focus:ring-purple-200 outline-none" required>
                </div>
                <div class="space-y-2">
                    <label class="block text-sm font-bold text-[#4A235A] ml-1">Hora</label>
                    <input type="time" th:field="*{hora}" class="w-full px-5 py-4 rounded-2xl bg-white border border-gray-100 shadow-sm focus:ring-2 focus:ring-purple-200 outline-none" required>
                </div>
            </div>

            <button type="submit" class="w-full bg-[#6E3B9C] text-white py-5 rounded-[2rem] font-bold text-lg hover:bg-purple-800 transition-all shadow-lg mt-4">
                Confirmar reserva
            </button>
            <a th:href="@{'/empresa/perfil/' + ${cita.empresa.id}}" class="block text-center text-gray-400 text-xs font-bold uppercase tracking-widest mt-4">Cancelar</a>
        </form>
    </main>
</body>
</html>
