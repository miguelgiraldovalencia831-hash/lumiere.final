<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset="UTF-8">
    <title>Lumiere - Lista de Empresas</title>
    <!-- Bootstrap para que se vea profesional -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            <h2 class="mb-0">Empresas Registradas</h2>
        </div>
        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead class="table-secondary">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Dirección</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 'lista' debe coincidir con el nombre en el Controller -->
                    <tr th:each="empresa : ${lista}">
                        <td th:text="${empresa.id}"></td>
                        <td th:text="${empresa.nombre}"></td>
                        <td th:text="${empresa.descripcion}"></td>
                        <td th:text="${empresa.direccion}"></td>
                    </tr>
                </tbody>
            </table>
            
            <div th:if="${#lists.isEmpty(lista)}" class="alert alert-warning">
                No hay empresas en la base de datos.
            </div>
        </div>
    </div>

</body>
</html>
