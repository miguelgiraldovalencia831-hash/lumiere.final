<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Panel Emprendedor - Lumière</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FFFCF9; }
        .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="p-10">
    <div class="max-w-6xl mx-auto">
        <div class="text-center py-20 mb-12">
            <span class="inline-flex items-center px-4 py-1.5 rounded-full border border-purple-100 text-[#6E3B9C] text-[10px] font-bold uppercase tracking-widest mb-6 bg-white shadow-sm">
                ✨ Crece con Lumière
            </span>
            <h1 class="text-7xl font-serif text-[#4A235A] mb-4 leading-tight">Tu negocio merece <span class="italic text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-pink-400">brillar.</span></h1>
            <p class="text-gray-500 text-lg mb-10 max-w-2xl mx-auto leading-relaxed italic">Administra tu marca y recibe reservas automáticas.</p>
            
            <div class="flex justify-center space-x-4">
                <a th:href="@{/empresas/nuevo}" class="bg-[#6E3B9C] text-white px-10 py-4 rounded-full font-bold shadow-lg hover:shadow-purple-100 transition-all">+ Publicar mi negocio</a>
                <a th:href="@{/}" class="bg-white text-gray-700 border border-gray-100 px-10 py-4 rounded-full font-bold shadow-sm">Volver al inicio</a>
            </div>
        </div>

        <!-- Lista de Negocios -->
        <h2 class="text-xs font-black text-gray-300 uppercase tracking-[0.5em] mb-10 text-center">Mis empresas activas</h2>
        <div class="grid md:grid-cols-2 gap-8">
            <div th:each="emp : ${lista}" class="bg-white p-10 rounded-[3rem] shadow-sm border border-gray-50 flex items-center justify-between hover:shadow-xl transition-all">
                <div class="flex items-center space-x-6">
                    <div class="w-16 h-16 bg-[#F3EBF7] rounded-[1.5rem] flex items-center justify-center text-2xl font-black text-[#6E3B9C] italic">L</div>
                    <div>
                        <h3 class="text-2xl font-serif text-[#4A235A]" th:text="${emp.nombre}"></h3>
                        <p class="text-gray-400 text-sm" th:text="${emp.direccion}"></p>
                    </div>
                </div>
                <a th:href="@{'/empresas/gestionar/' + ${emp.id}}" class="bg-slate-900 text-white px-8 py-3 rounded-full font-bold text-xs uppercase tracking-widest hover:bg-[#6E3B9C] transition-all">Gestionar</a>
            </div>
        </div>
    </div>
</body>
</html>
