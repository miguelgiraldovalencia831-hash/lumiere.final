<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>lumiere - Registrar Negocio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 font-[Inter] min-h-screen flex items-center justify-center p-6">
    <div class="max-w-xl w-full bg-white rounded-[3rem] shadow-2xl p-12 border border-slate-100">
        <div class="mb-10">
            <h2 class="text-4xl font-bold text-slate-900">Nuevo Negocio</h2>
            <p class="text-slate-500 mt-2">Danos los detalles para empezar.</p>
        </div>

        <form th:action="@{/empresas/guardar}" th:object="${empresa}" method="post" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-2">Nombre del Negocio</label>
                <input type="text" th:field="*{nombre}" required class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-pink-300 outline-none transition-all placeholder-slate-300" placeholder="Ej. Nails & Spa">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-2">Descripción</label>
                <textarea th:field="*{descripcion}" rows="3" required class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-pink-300 outline-none transition-all placeholder-slate-300" placeholder="Cuéntanos qué haces..."></textarea>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-2">Ubicación / Dirección</label>
                <input type="text" th:field="*{direccion}" required class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-pink-300 outline-none transition-all placeholder-slate-300" placeholder="Ciudad, Barrio...">
            </div>
            
            <div class="pt-6 flex space-x-4">
                <a th:href="@{/empresas}" class="flex-1 text-center py-4 rounded-2xl font-bold text-slate-400 hover:bg-slate-50 transition-all">Cancelar</a>
                <button type="submit" class="flex-[2] bg-pink-600 text-white py-4 rounded-2xl font-bold hover:bg-pink-700 shadow-xl shadow-pink-200 transition-all">Guardar Empresa</button>
            </div>
        </form>
    </div>
</body>
</html>
