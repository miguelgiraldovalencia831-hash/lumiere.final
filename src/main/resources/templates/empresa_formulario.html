<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Negocio - Lumière</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FFFCF9; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .flower-frame { pointer-events: none; z-index: 10; opacity: 0.20; width: 300px; }
        .btn-purple { background-color: #6E3B9C; transition: all 0.3s ease; }
        .btn-purple:hover { background-color: #4A235A; transform: translateY(-2px); shadow: 0 10px 15px -3px rgba(110, 59, 156, 0.3); }
    </style>
</head>
<body class="relative min-h-screen">

    <!-- MARCO DE FLORES FIJAS -->
    <div class="fixed left-0 top-0 flower-frame h-screen flex items-start">
        <img src="https://www.transparentpng.com/download/floral/flower-pink-floral-design-png-11.png" class="w-full mt-20">
    </div>
    <div class="fixed right-0 top-0 flower-frame h-screen flex items-start rotate-180">
        <img src="https://www.transparentpng.com/download/floral/flower-pink-floral-design-png-11.png" class="w-full mt-20">
    </div>

    <!-- LOGO Y CABECERA -->
    <header class="text-center pt-10 pb-6 relative z-20">
        <img th:src="@{/images/logo.png}" alt="Lumiere Logo" class="h-24 mx-auto mb-2">
        <p class="text-[10px] tracking-[0.4em] text-gray-400 uppercase font-light italic">Illuminate your beauty business</p>
    </header>

    <!-- FORMULARIO -->
    <main class="max-w-3xl mx-auto px-6 py-12 relative z-20">
        <div class="text-center mb-12">
            <span class="inline-flex items-center px-4 py-1.5 rounded-full border border-purple-100 text-[#6E3B9C] text-[10px] font-bold uppercase tracking-widest mb-6 bg-white shadow-sm">
                ✨ Da vida a tu marca
            </span>
            <h1 class="text-6xl font-serif text-[#4A235A] mb-4">Publica tu negocio</h1>
            <p class="text-gray-400 text-lg italic leading-relaxed">Completa los detalles para que tus clientes puedan descubrirte.</p>
        </div>

        <div class="bg-white p-10 md:p-16 rounded-[3.5rem] shadow-2xl border border-white">
            <form th:action="@{/empresas/guardar}" th:object="${empresa}" method="post" class="space-y-8">
                
                <!-- Nombre del Negocio -->
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-2">Nombre de la Empresa</label>
                    <input type="text" th:field="*{nombre}" placeholder="Ej. Nails Studio Lumière" 
                        class="w-full px-6 py-5 rounded-2xl bg-[#FFFCF9] border-none focus:ring-2 focus:ring-purple-200 outline-none transition-all placeholder:text-gray-300 font-medium" required>
                </div>

                <!-- Descripción -->
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-2">Descripción del Negocio</label>
                    <textarea th:field="*{descripcion}" rows="3" placeholder="¿Qué hace único a tu salón o spa?" 
                        class="w-full px-6 py-5 rounded-2xl bg-[#FFFCF9] border-none focus:ring-2 focus:ring-purple-200 outline-none transition-all placeholder:text-gray-300 font-medium" required></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Dirección -->
                    <div class="space-y-2">
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-2">Ubicación (Ciudad / Barrio)</label>
                        <input type="text" th:field="*{direccion}" placeholder="Ej. Pereira, Centro" 
                            class="w-full px-6 py-5 rounded-2xl bg-[#FFFCF9] border-none focus:ring-2 focus:ring-purple-200 outline-none transition-all placeholder:text-gray-300 font-medium" required>
                    </div>

                    <!-- Teléfono -->
                    <div class="space-y-2">
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-2">WhatsApp de Contacto</label>
                        <input type="tel" th:field="*{telefono}" placeholder="Ej. 573001234567" 
                            class="w-full px-6 py-5 rounded-2xl bg-[#FFFCF9] border-none focus:ring-2 focus:ring-purple-200 outline-none transition-all placeholder:text-gray-300 font-medium" required>
                    </div>
                </div>

                <!-- FOTO URL (EL NUEVO CAMPO) -->
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-2">Imagen de Portada (Link URL)</label>
                    <input type="text" th:field="*{fotoUrl}" placeholder="Pega el link de una foto de tu local..." 
                        class="w-full px-6 py-5 rounded-2xl bg-[#FFFCF9] border-none focus:ring-2 focus:ring-purple-200 outline-none transition-all placeholder:text-gray-300 font-medium">
                    <p class="text-[9px] text-gray-300 italic ml-2">* Puedes usar un link de Pinterest, Instagram o cualquier servidor de imágenes.</p>
                </div>

                <!-- BOTONES -->
                <div class="pt-8 flex flex-col md:flex-row items-center space-y-4 md:space-y-0 md:space-x-6">
                    <button type="submit" class="w-full md:flex-[2] btn-purple text-white py-5 rounded-[2.5rem] font-bold text-lg shadow-xl shadow-purple-100 uppercase tracking-tighter italic">
                        Publicar Negocio
                    </button>
                    <a th:href="@{/empresas}" class="w-full md:flex-1 text-center py-5 text-gray-400 text-[10px] font-black uppercase tracking-[0.2em] hover:text-purple-600 transition-colors">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>

        <footer class="mt-20 text-center">
            <p class="text-[9px] text-gray-300 uppercase tracking-[0.6em]">Lumière Beauty Network · 2026</p>
        </footer>
    </main>

</body>
</html>
