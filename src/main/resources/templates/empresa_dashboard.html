<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Lumiere - Dashboard</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-slate-50 flex">
    <aside class="w-64 bg-white border-r h-screen sticky top-0 p-8 flex flex-col">
        <img th:src="@{/images/logo.png}" class="h-12 mb-10 mx-auto">
        <nav class="space-y-4">
            <a href="#" class="block font-bold text-pink-600 bg-pink-50 p-4 rounded-2xl">🏠 Dashboard</a>
            <a th:href="@{/empresas}" class="block text-slate-500 p-4 rounded-2xl hover:bg-slate-50">⬅️ Mis Empresas</a>
        </nav>
    </aside>

    <main class="flex-1 p-12">
        <h1 class="text-5xl font-black mb-12 uppercase tracking-tighter" th:text="${empresa.nombre}"></h1>
        
        <div class="grid grid-cols-3 gap-8">
            <!-- FORMULARIO PARA AÑADIR SERVICIOS -->
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border">
                <h3 class="font-bold mb-6 text-slate-400 text-xs uppercase italic">Añadir Servicio</h3>
                <form th:action="@{/servicios/guardar}" th:object="${nuevoServicio}" method="post" class="space-y-4">
                    <input type="hidden" name="empresaId" th:value="${empresa.id}">
                    <input type="text" th:field="*{nombre}" placeholder="Nombre del servicio" class="w-full bg-slate-50 p-4 rounded-2xl outline-none" required>
                    <input type="number" step="0.01" th:field="*{precio}" placeholder="Precio ($)" class="w-full bg-slate-50 p-4 rounded-2xl outline-none" required>
                    <button type="submit" class="w-full bg-pink-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-pink-100 hover:bg-pink-700 transition-all">
                        + Registrar Servicio
                    </button>
                </form>
            </div>

            <!-- TABLA DE SERVICIOS ACTUALES -->
            <div class="col-span-2 bg-white p-8 rounded-[2.5rem] shadow-sm border">
                <h3 class="font-bold mb-6 text-slate-400 text-xs uppercase italic">Servicios Registrados</h3>
                <table class="w-full">
                    <tr th:each="s : ${servicios}" class="border-b border-slate-50 last:border-0">
                        <td class="py-5 font-bold text-slate-800 text-lg" th:text="${s.nombre}"></td>
                        <td class="py-5 text-right font-black text-pink-600 text-xl" th:text="'$' + ${s.precio}"></td>
                    </tr>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
