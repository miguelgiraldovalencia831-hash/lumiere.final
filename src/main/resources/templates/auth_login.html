<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Lumière</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FFFCF9; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .flower-frame { pointer-events: none; z-index: 10; opacity: 0.20; width: 300px; }
    </style>
</head>
<body class="relative min-h-screen">

    <!-- FLORES FIJAS -->
    <div class="fixed left-0 top-0 flower-frame h-screen flex items-start">
        <img src="https://www.transparentpng.com/download/floral/flower-pink-floral-design-png-11.png" class="w-full mt-20">
    </div>
    <div class="fixed right-0 top-0 flower-frame h-screen flex items-start rotate-180">
        <img src="https://www.transparentpng.com/download/floral/flower-pink-floral-design-png-11.png" class="w-full mt-20">
    </div>

    <!-- HEADER / LOGO -->
    <header class="text-center pt-10 pb-6 relative z-20">
        <img th:src="@{/images/logo.png}" alt="Lumiere Logo" class="h-24 mx-auto mb-2">
        <p class="text-[10px] tracking-[0.4em] text-gray-400 uppercase font-light">Illuminate your beauty business</p>
        
        <!-- MENU NAVEGACIÓN -->
        <div class="flex justify-center space-x-10 mt-8 text-sm font-medium text-gray-500">
            <a th:href="@{/}" class="hover:text-purple-600">Inicio</a>
            <a th:href="@{/explorar}" class="hover:text-purple-600">Buscar empresas</a>
            <a th:href="@{/registro}" class="hover:text-purple-600">Para emprendedores</a>
        </div>
    </header>

    <!-- CONTENIDO LOGIN -->
    <main class="max-w-md mx-auto px-6 py-12 relative z-20">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-serif text-[#6E3B9C] mb-3">Iniciar sesión</h1>
            <p class="text-gray-400 text-sm">Bienvenida a Lumière Beauty Network</p>
        </div>

        <form th:action="@{/login/entrar}" method="post" class="space-y-6">
            <div class="space-y-2">
                <label class="block text-sm font-bold text-[#4A235A] ml-1">Correo</label>
                <input type="email" name="email" class="w-full px-5 py-4 rounded-2xl bg-white border border-gray-100 shadow-sm focus:ring-2 focus:ring-purple-200 outline-none transition-all" required>
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-bold text-[#4A235A] ml-1">Contraseña</label>
                <input type="password" name="password" class="w-full px-5 py-4 rounded-2xl bg-white border border-gray-100 shadow-sm focus:ring-2 focus:ring-purple-200 outline-none transition-all" required>
            </div>

            <button type="submit" class="w-full bg-[#6E3B9C] text-white py-4 rounded-2xl font-bold text-lg hover:bg-purple-800 transition-all shadow-lg shadow-purple-100">
                Entrar
            </button>
        </form>

        <!-- Elemento decorativo inferior (línea con círculo) -->
        <div class="mt-16 flex items-center justify-center">
            <div class="h-[1px] bg-gray-200 w-full"></div>
            <div class="mx-4 text-gray-400 text-xs italic">o</div>
            <div class="h-[1px] bg-gray-200 w-full"></div>
        </div>
        <p class="text-center mt-6 text-sm text-gray-500">
            ¿No tienes cuenta? <a th:href="@{/registro}" class="text-[#6E3B9C] font-bold italic">Regístrate aquí</a>
        </p>
    </main>

</body>
</html>
